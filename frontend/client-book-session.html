<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Session | Sarangi Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=9">
    <style>
        /* Base Dashboard Styles (Kept identical for consistency) */
        .dashboard-layout { display: flex; min-height: 100vh; background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .sidebar-logo { padding: 20px; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; }
        .nav-item { padding: 12px 20px; color: #64748b; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; border-right: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #f1f5f9; color: #0f172a; border-right: 3px solid #22c55e; }
        .main-content { flex: 1; padding: 40px; margin-left: 260px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

        /* Pricing Card Styles */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        .pricing-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .pricing-card.highlighted { border: 2px solid #22c55e; box-shadow: 0 10px 15px -3px rgba(34,197,94,0.1); }
        .urgency-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .card-title { font-family: 'Montserrat'; font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
        .card-desc { font-size: 14px; color: #64748b; margin-bottom: 20px; line-height: 1.5; }
        .price-strike { text-decoration: line-through; color: #94a3b8; font-size: 14px; }
        .price-active { font-size: 28px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
        .features-list { list-style: none; padding: 0; margin: 0 0 30px 0; flex: 1; }
        .features-list li { font-size: 14px; color: #334155; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 10px; }
        .features-list li i { color: #22c55e; margin-top: 3px; }
        .card-btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-outline { background: transparent; border: 1px solid #22c55e; color: #22c55e; }
        .btn-outline:hover { background: #22c55e; color: white; }
        .btn-solid { background: #22c55e; color: white; }
        .btn-solid:hover { background: #16a34a; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        .modal-title { font-family: 'Montserrat'; font-size: 18px; font-weight: 600; color: #0f172a; }
        .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; }
        
        /* Forms */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 7px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; background: #f8fafc; box-sizing: border-box; color: #64748b; }
        /* Make inputs look readonly but clean */
        .form-group input[readonly] { cursor: not-allowed; background: #e2e8f0; border-color: #cbd5e1; }

        /* Extended Form Styles */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; gap: 0; } }
        textarea.form-control { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; background: #f8fafc; box-sizing: border-box; resize: vertical; }
        textarea.form-control:focus { border-color: var(--primary-green); outline: none; background: white; }
        .form-divider { border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0; }
        
        /* Radio Groups */
        .radio-group-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 12px; }
        .radio-group { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .custom-radio { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #64748b; cursor: pointer; }
        .custom-radio input[type="radio"] { width: 16px; height: 16px; accent-color: #22c55e; margin: 0; cursor: pointer; }

        /* Modern Selectable Pill Buttons for Radio Group */
        .radio-group-pills { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .radio-pill { cursor: pointer; margin: 0; }
        
        /* Hide the default tiny circle */
        .radio-pill input[type="radio"] { display: none; } 
        
        /* Default state (Unselected) */
        .radio-pill .pill-text {
            display: inline-block;
            padding: 10px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #64748b;
            background: white;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        /* Highlight state (Selected) */
        .radio-pill input[type="radio"]:checked + .pill-text {
            background: rgba(34,197,94,0.1);
            border-color: #22c55e;
            color: #166534;
            font-weight: 600;
            box-shadow: 0 0 0 1px #22c55e; /* Adds a nice crisp edge */
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2 style="font-family: 'Montserrat'; font-size: 18px; letter-spacing: 1px;">SARANGI<span style="color: var(--primary-green);">CLIENT</span></h2>
        </div>
        <nav style="flex: 1;">
            <a href="user-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Back to Dashboard</a>
        </nav>
        <div style="padding: 20px;">
            <a href="login.html" class="nav-item" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- SECTION 1: PRICING CARDS -->
        <div id="cards-section">
            <header class="dashboard-header">
                <div>
                    <h1 style="font-family: 'Montserrat'; font-size: 24px; font-weight: 700; color: #0f172a;">Select a Plan</h1>
                    <p style="color: #64748b; margin-top: 5px;">Choose the advisory service you need to continue.</p>
                </div>
            </header>

            <div id="cards-container" class="grid-cards">
                <div style="text-align: center; width: 100%; padding: 40px; color: #64748b;">Loading available plans...</div>
            </div>
        </div>

        <!-- SECTION 2: REGISTRATION FORM (Initially Hidden) -->
        <div id="form-section" style="display: none; animation: fadeIn 0.4s ease;">
            <header class="dashboard-header" style="margin-bottom: 20px;">
                <div>
                    <h1 style="font-family: 'Montserrat'; font-size: 24px; font-weight: 700; color: #0f172a;">Complete Your Booking</h1>
                    <div style="display: inline-block; background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #166534; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 14px; margin-top: 10px;" id="selectedPlanDisplay">
                        Selected Plan: 
                    </div>
                </div>
                <button class="btn btn-outline" onclick="showCards()" style="padding: 8px 16px; border-radius: 6px; background: white; border: 1px solid #e2e8f0; cursor: pointer;"><i class="fas fa-arrow-left"></i> Back to Plans</button>
            </header>

            <div class="section-card">
                <form id="extendedBookingForm" onsubmit="submitBooking(event)">
                    <input type="hidden" id="hiddenSelectedPlan">
                    
                    <h3 class="section-title">Personal Details</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <!-- Removed 'readonly' and added 'required' -->
                            <input type="text" id="b-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Company Name</label>
                            <input type="text" id="b-company" class="form-control">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email Address *</label>
                            <input type="email" id="b-email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="b-phone" class="form-control" required>
                        </div>
                    </div>

                    <hr class="form-divider">

                    <!-- NEW: Booking Date and Time fields to satisfy backend validation -->
                    <h3 class="section-title">Schedule & Requirements</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Preferred Date *</label>
                            <input type="date" id="b-date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Preferred Time *</label>
                            <input type="time" id="b-time" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Project Type *</label>
                            <select id="b-projectType" class="form-control" required>
                                <option value="" disabled selected>Select Type</option>
                                <option value="New Project">New Project</option>
                                <option value="Existing Project Enhancement">Existing Project Enhancement</option>
                                <option value="Consultation Only">Consultation Only</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Estimated Budget</label>
                            <select id="b-budget" class="form-control">
                                <option value="" disabled selected>Select Budget</option>
                                <option value="Below ₹50,000">Below ₹50,000</option>
                                <option value="₹50,000 – ₹2,00,000">₹50,000 – ₹2,00,000</option>
                                <option value="Above ₹2,00,000">Above ₹2,00,000</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tell us about your requirements *</label>
                        <textarea id="b-details" class="form-control" rows="4" required placeholder="Briefly describe what you are looking to achieve..."></textarea>
                    </div>

                    <hr class="form-divider">

                    <h3 class="section-title">Contact Preferences</h3>
                    <div class="form-group">
                        <label class="radio-group-label">Preferred Contact Method</label>
                        <div class="radio-group-pills">
                            <label class="radio-pill">
                                <input type="radio" name="contactMethod" value="Email" checked>
                                <span class="pill-text">Email</span>
                            </label>
                            <label class="radio-pill">
                                <input type="radio" name="contactMethod" value="Phone">
                                <span class="pill-text">Phone Call</span>
                            </label>
                            <label class="radio-pill">
                                <input type="radio" name="contactMethod" value="WhatsApp">
                                <span class="pill-text">WhatsApp</span>
                            </label>
                            <label class="radio-pill">
                                <input type="radio" name="contactMethod" value="Video">
                                <span class="pill-text">Video Meeting</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="card-btn btn-solid" style="margin-top: 20px; font-size: 16px; padding: 14px;">Confirm Booking Request</button>
                </form>
            </div>
        </div>
    </main>
</div>


<div id="bookingModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Confirm Booking Request</h3>
            <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        
        <form id="bookingForm" onsubmit="submitBooking(event)">
            <div style="background: rgba(34,197,94,0.1); border: 1px solid #22c55e; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
                <span style="font-size: 13px; color: #166534; font-weight: 600;">Selected Plan:</span>
                <div id="displaySelectedPlan" style="font-family: 'Montserrat'; font-size: 16px; font-weight: 700; color: #0f172a;"></div>
            </div>

            <input type="hidden" id="selectedPlanInput">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="b-name" readonly>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="b-email" readonly>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="b-phone" readonly>
            </div>
            <div class="form-group">
                <label>Company / Business Name</label>
                <input type="text" id="b-company" readonly>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button type="button" onclick="closeModal()" class="card-btn btn-outline">Cancel</button>
                <button type="submit" class="card-btn btn-solid">Submit Request</button>
            </div>
        </form>
    </div>
</div>

<!-- Floating WhatsApp Button -->
<a href="#" id="whatsapp-btn" class="whatsapp-float" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-whatsapp"></i>
</a>
<style>
    .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 40px; right: 40px; background-color: #25d366; color: #FFF; border-radius: 50px; text-align: center; font-size: 30px; box-shadow: 2px 2px 3px #999; z-index: 100; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease; text-decoration: none; }
    .whatsapp-float:hover { transform: scale(1.1); color: #FFF; }
</style>

<script>
    // WhatsApp logic
    document.addEventListener('DOMContentLoaded', () => {
        const waBtn = document.getElementById('whatsapp-btn');
        if (waBtn) {
            let serviceContext = 'Client Dashboard Support';
            let waMessage = encodeURIComponent(`Hi Sarangi Consulting! I need support from my dashboard.`);
            let waNumber = '919999999999';
            waBtn.href = `https://wa.me/${waNumber}?text=${waMessage}`;
        }
    });
    
    const API_BASE = 'http://localhost:5000';
    let currentUserData = {};

    // 1. Fetch User Data to Pre-fill
    async function loadUserData() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'login.html'; return; }

        try {
            const res = await fetch(`${API_BASE}/api/auth/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                currentUserData = data.data;
                
                // Safely pre-fill the form immediately
                const nameEl = document.getElementById('b-name');
                if (nameEl) nameEl.value = currentUserData.name || '';
                
                const emailEl = document.getElementById('b-email');
                if (emailEl) emailEl.value = currentUserData.email || '';
                
                const phoneEl = document.getElementById('b-phone');
                if (phoneEl) phoneEl.value = currentUserData.phone || '';
                
                const companyEl = document.getElementById('b-company');
                if (companyEl) {
                    companyEl.value = (currentUserData.lead && currentUserData.lead.company) ? currentUserData.lead.company : '';
                }
            }
        } catch (err) { 
            console.error('Error fetching user data:', err); 
        }
    }

    // 2. Fetch and Render Pricing Cards
    async function loadPricingCards() {
        try {
            const res = await fetch(`${API_BASE}/api/pricing-cards`);
            const data = await res.json();
            const container = document.getElementById('cards-container');
            
            if (data.success && data.data.length > 0) {
                container.innerHTML = '';
        
                // Filter out cards where is_active is false
                const activeCards = data.data.filter(card => card.is_active !== false);
                
                if (activeCards.length === 0) {
                    container.innerHTML = '<div style="text-align:center; width:100%; color:#64748b;">No plans currently available.</div>';
                    return;
                }

                // Use the new activeCards array for the loop
                activeCards.forEach(card => {
                    const features = Array.isArray(card.features) ? card.features : [];
                    const featureHtml = features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('');
                    const btnClass = card.is_highlighted ? 'btn-solid' : 'btn-outline';
                    const urgencyHtml = card.urgency_text ? `<div class="urgency-badge">${card.urgency_text}</div>` : '';
                    const highlightedClass = card.is_highlighted ? 'highlighted' : '';
                    const buttonText = card.button_text || (card.is_highlighted ? 'Register My Advisory Session' : 'Schedule a Discovery Call');

                    // Escape single quotes just in case your card title has one (e.g. "Consultant's Plan")
                    const safeTitle = card.title.replace(/'/g, "\\'");

                    // Render card with the correct showBookingForm function
                    const cardHtml = `
                        <div class="pricing-card ${highlightedClass}">
                            ${urgencyHtml}
                            <h3 class="card-title">${card.title}</h3>
                            <p class="card-desc">${card.description}</p>
                            <div class="price-strike">${card.price_strike || '&nbsp;'}</div>
                            <div class="price-active">${card.price_active}</div>
                            <ul class="features-list">${featureHtml}</ul>
                            <button class="card-btn ${btnClass}" onclick="showBookingForm('${safeTitle}')">
                                ${buttonText}
                            </button>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
            }
        } catch (err) { 
            console.error('Error loading cards:', err); 
        }
    }

    // 3. UI Toggle Logic
    function showBookingForm(planTitle) {
        const cardsSec = document.getElementById('cards-section');
        const formSec = document.getElementById('form-section');
        
        if (cardsSec && formSec) {
            cardsSec.style.display = 'none';
            formSec.style.display = 'block';
            window.scrollTo(0,0);

            document.getElementById('selectedPlanDisplay').innerHTML = `Selected Plan: <span style="color:#0f172a;">${planTitle}</span>`;
            document.getElementById('hiddenSelectedPlan').value = planTitle;
        } else {
            console.error("Could not find cards-section or form-section in HTML.");
        }
    }

    function showCards() {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('cards-section').style.display = 'block';
        window.scrollTo(0,0);
    }

    // 4. Handle Form Submission
    async function submitBooking(e) {
        e.preventDefault();
        const token = localStorage.getItem('token');
        
        // Grab the raw values from the form
        const preferredMedium = document.querySelector('input[name="contactMethod"]:checked').value;
        const projectType = document.getElementById('b-projectType').value;
        const budget = document.getElementById('b-budget').value;
        const details = document.getElementById('b-details').value;

        // --- THE FIX: Map the medium to the strict database ENUM ---
        let mappedMeetingMode = 'Online'; // Default to Online for Video, Email, WhatsApp
        if (preferredMedium === 'Phone Call') {
            mappedMeetingMode = 'Phone Call'; // Matches the database ENUM exactly
        }

        const payload = {
            client_name: document.getElementById('b-name').value,
            email: document.getElementById('b-email').value,
            phone: document.getElementById('b-phone').value,
            company_name: document.getElementById('b-company').value,
            
            consultation_type: document.getElementById('hiddenSelectedPlan').value,
            consultant: 'To be assigned', 
            
            booking_date: document.getElementById('b-date').value,
            booking_time: document.getElementById('b-time').value,
            
            // Use our safely mapped ENUM value here
            meeting_mode: mappedMeetingMode, 
            
            // Save their exact requested medium in the notes so you still see it in the admin panel!
            notes: `Requested Medium: ${preferredMedium} | Type: ${projectType} | Budget: ${budget} | Details: ${details}`,
            
            status: 'Pending'
        };

        try {
            const res = await fetch(`${API_BASE}/api/bookings`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if(data.success) {
                alert('Success! Your booking request has been submitted.');
                window.location.href = 'client-book-session.html'; 
            } else {
                alert(data.message || 'Error submitting booking.');
            }
        } catch(err) {
            alert('A network error occurred. Please try again.');
        }
    }

    // Initialize Page
    document.addEventListener('DOMContentLoaded', () => {
        loadUserData();
        loadPricingCards();
    });
</script>

</body>
</html>
