<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sarangi Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=8">
     <link rel="stylesheet" href="sara-chatbot.css">
</head>
<body class="bg-light">

    <!-- HEADER (Simplified for Login) -->
    <header class="header" id="header" style="background: #0b0b0c;">
        <div class="container header-container">
            <a href="index.html" class="logo-container">
                <svg class="logo-mark" width="32" height="32" viewBox="0 0 100 100" fill="none" stroke="var(--primary-green)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
                    <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" />
                    <line x1="10" y1="30" x2="90" y2="70" />
                </svg>
                <div class="logo-text text-white">SARANGI<span style="color:var(--primary-green)">CONSULTING</span></div>
            </a>
            <nav class="desktop-nav">
                <ul class="nav-links">
                    <li><a href="index.html">Back to Home</a></li>
                </ul>
            </nav>
        </div>
    </header>
 
    <!-- LOGIN FORM SECTION -->
    <section class="section-padding" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
        <div class="container" style="max-width: 450px;">
            <div class="glass-card" style="padding: 40px; text-align: center; border-radius: 12px;">
                <h2 style="font-family: 'Montserrat', sans-serif; font-weight: 700; margin-bottom: 10px; color: var(--exec-black);">Welcome Back</h2>
                <p style="color: var(--text-grey); margin-bottom: 30px; font-size: 14px;">Sign in to your dashboard</p>
                
                <form id="loginForm" style="text-align: left;" autocomplete="off">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: var(--exec-black);">Email Address</label>
                        <input type="email" id="email" required style="width: 100%; padding: 12px 15px; border: 1px solid var(--border-grey); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px; background: var(--white); color: var(--exec-black);" placeholder="Email" autocomplete="off">
                    </div>
                    <div style="margin-bottom: 25px; position: relative;">
                        <label style="display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: var(--exec-black);">Password</label>
                        <input type="password" id="password" required style="width: 100%; padding: 12px 15px; padding-right: 40px; border: 1px solid var(--border-grey); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px; background: var(--white); color: var(--exec-black);" placeholder="Password" autocomplete="new-password">
                        <span id="togglePassword" style="position: absolute; right: 15px; top: 38px; cursor: pointer; user-select: none; color: var(--exec-black);">👁️</span>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-weight: 600; border-radius: 6px;">Sign In</button>
                </form>
 
                <div style="margin-top: 25px; font-size: 13px; color: var(--text-grey);">
                    Don't have an account? <a href="register.html" style="color: var(--primary-green); font-weight: 600; text-decoration: none;">Sign Up Free</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.message || 'Login failed'); return; }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                const userRole = data.user.role.toLowerCase();

                // Route based on the user's role
                if (userRole === 'admin' || userRole === 'super admin') {
                    window.location.href = 'admin-dashboard.html';
                } else if (userRole === 'employee') {
                    window.location.href = 'employee-dashboard.html';
                } else if (userRole === 'intern') {
                    window.location.href = 'intern-dashboard.html'; // New Intern Route
                }else {
                    // Default fallback for clients/viewers
                    window.location.href = 'user-dashboard.html'; 
                }
            } catch (err) {
                alert('Could not connect to server. Please run the backend first.');
            }
        });
    </script>

    <!-- Floating WhatsApp Button -->
    <a href="#" id="whatsapp-btn" class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
    </a>

    <style>
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 3px #999;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            text-decoration: none;
        }
        .whatsapp-float:hover {
            transform: scale(1.1);
            color: #FFF;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const waBtn = document.getElementById('whatsapp-btn');
            if (waBtn) {
                let serviceContext = 'General Inquiry';
                let waMessage = encodeURIComponent(`Hi Sarangi Consulting! I'm interested in learning more about your services (${serviceContext}).`);
                let waNumber = '919999999999';
                
                waBtn.href = `https://wa.me/${waNumber}?text=${waMessage}`;

                waBtn.addEventListener('click', () => {
                    fetch('http://localhost:5000/api/whatsapp/click', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            page: window.location.pathname || 'home',
                            service: serviceContext
                        })
                    }).catch(err => console.error('Failed to log WhatsApp click:', err));
                });
            }
        });
        // Show Password Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
            });
        }
    </script>
    <script src="sara-chatbot.js"></script>

</body>
</html>
