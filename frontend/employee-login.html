<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | Sarangi Consulting</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=8">
    <link rel="stylesheet" href="sara-chatbot.css">
    <link rel="stylesheet" href="employee-portal.css">
</head>

<body class="bg-light">

<header class="header" id="header" style="background: var(--exec-black);">
    <div class="container header-container">
        <a href="index.html" class="logo-container">
            <svg class="logo-mark" width="32" height="32" viewBox="0 0 100 100" fill="none" stroke="var(--primary-green)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
                <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" />
                <line x1="10" y1="30" x2="90" y2="70" />
            </svg>
            <div class="logo-text text-white">SARANGI<span style="color:var(--primary-green)">CONSULTING</span></div>
        </a>

        <nav class="desktop-nav">
            <ul class="nav-links">
                <li><a href="index.html">Back to Home</a></li>
                <li><a href="login.html">Admin Login</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="section-padding" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="container" style="max-width: 460px;">
        <div class="glass-card" style="padding: 40px; text-align: center; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 12px; border: 1px solid #eee;">

            <div style="width: 64px; height: 64px; margin: 0 auto 18px; border-radius: 18px; background: linear-gradient(135deg, #064e3b, #22c55e); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                <i class="fas fa-id-badge"></i>
            </div>

            <h2 style="font-family: 'Montserrat', sans-serif; font-weight: 700; margin-bottom: 10px;">
                Employee Portal
            </h2>

            <p style="color: #666; margin-bottom: 30px; font-size: 14px;">
                Sign in to access your offer letter, salary slip, experience letter and relieving letter.
            </p>

            <form id="employeeLoginForm" style="text-align: left;" autocomplete="off">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #333;">
                        Employee ID
                    </label>
                    <input type="text" id="employeeId" required
                        style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px;"
                        placeholder="EMP001" autocomplete="off">
                </div>

                <div style="margin-bottom: 25px; position: relative;">
                    <label style="display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #333;">
                        Password
                    </label>
                    <input type="password" id="employeePassword" required
                        style="width: 100%; padding: 12px 15px; padding-right: 40px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px;"
                        placeholder="Password" autocomplete="new-password">

                    <span id="toggleEmployeePassword"
                        style="position: absolute; right: 15px; top: 38px; cursor: pointer; user-select: none;">
                        👁️
                    </span>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-weight: 600; border-radius: 6px;">
                    <i class="fas fa-right-to-bracket"></i> Employee Sign In
                </button>
            </form>

            <div style="margin-top: 22px; padding: 12px; background: #f8fafc; border-radius: 8px; font-size: 13px; color: #64748b;">
                Demo Login: <strong>EMP001</strong> / <strong>password123</strong>
            </div>

        </div>
    </div>
</section>

<script src="script.js"></script>
<script src="employee-portal.js"></script>
<script src="sara-chatbot.js"></script>

<script>
    const toggleEmployeePassword = document.querySelector('#toggleEmployeePassword');
    const employeePasswordInput = document.querySelector('#employeePassword');

    if (toggleEmployeePassword && employeePasswordInput) {
        toggleEmployeePassword.addEventListener('click', function () {
            const type = employeePasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            employeePasswordInput.setAttribute('type', type);
        });
    }
</script>

</body>
</html>
